<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TROYA</title>
<style>
  * { margin: 5; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    background: #fff;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #track {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 1400px; 
    margin: 0 auto;
    padding: 0 24px;   
}
  .slide {
    width: 100%;
    line-height: 0;
  }
  .slide img, .slide video {
    width: 100%;
    display: block;
    border-radius: 20px;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
  }
</style>
</head>
<body oncontextmenu="return false;">

<div id="track">
  <div class="slide"><img src="assets/1.png" alt=""></div>
  <div class="slide"><img src="assets/2.png" alt=""></div>
  <div class="slide"><img src="assets/3.png" alt=""></div>
  <div class="slide"><img src="assets/4.png" alt=""></div>
  <div class="slide"><img src="assets/5.png" alt=""></div>
  <div class="slide"><img src="assets/6.png" alt=""></div>
  <div class="slide"><img src="assets/7.png" alt=""></div>
  <div class="slide">
    <video
      src="assets/8.mp4"
      playsinline
      webkit-playsinline
      muted
      loop
      autoplay
      disablePictureInPicture
      disableRemotePlayback
      controlsList="nodownload nofullscreen noremoteplayback noplaybackrate"
      x-webkit-airplay="deny"
      oncontextmenu="return false;"
    ></video>
  </div>
  <div class="slide"><img src="assets/9.png" alt=""></div>
  <div class="slide"><img src="assets/10.png" alt=""></div>
  <div class="slide"><img src="assets/11.png" alt=""></div>
  <div class="slide"><img src="assets/12.png" alt=""></div>
  <div class="slide"><img src="assets/13.png" alt=""></div>
  <div class="slide"><img src="assets/14.png" alt=""></div>
</div>

<script>
  const video = document.querySelector('video');
  video.playbackRate = 2;

  function checkVideo() {
    const rect = video.getBoundingClientRect();
    const visible = rect.top < window.innerHeight && rect.bottom > 0;
    if (visible) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }
  }

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => {
        checkVideo();
        ticking = false;
      });
      ticking = true;
    }
  });

  checkVideo();
</script>

</body>
</html>
